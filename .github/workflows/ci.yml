name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version: "1.22"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Build
        run: go build ./cmd/provenance-check/...

      - name: Build wasm
        run: GOOS=js GOARCH=wasm go build -o /tmp/main.wasm ./cmd/wasm

      - name: Test
        run: go test -race -cover ./...

      - name: Test site logic
        run: node --test site/*.test.js
